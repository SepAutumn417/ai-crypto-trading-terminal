name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  python:
    name: Python (3.12 + PostgreSQL 16)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crypto
          POSTGRES_PASSWORD: crypto
          POSTGRES_DB: crypto_terminal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crypto"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://crypto:crypto@localhost:5432/crypto_terminal_test
      TEST_DATABASE_URL: postgresql+asyncpg://crypto:crypto@localhost:5432/crypto_terminal_test
      MOCK_EXCHANGE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Run Alembic migrations
        working-directory: apps/api
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest -v --tb=short

  frontend:
    name: Frontend (Next.js + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter web lint

      - name: Type check
        run: pnpm --filter web exec tsc --noEmit

      - name: Build
        run: pnpm --filter web build