<!-- Project Shell Fragment — shared layout for all pages -->
<style>
  /* ── Shell Shared Styles ── */
  .shell-root {
    font-family: var(--font-sans);
  }

  /* Nav item base */
  [data-nav-key] {
    transition: background 120ms ease, color 120ms ease;
    text-decoration: none;
  }
  [data-nav-key]:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
  }

  /* Nav active state (set via data-active="true" by leaf pages) */
  [data-nav-key][data-active="true"] {
    background: var(--color-primary-muted);
    color: var(--color-primary);
  }

  /* Nav icon sizing */
  [data-nav-key] svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  /* Nav disabled */
  [data-nav-key].nav-disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Status badge mono numbers */
  .status-badge-value {
    font-family: var(--font-mono);
    font-variant-numeric: tabular-nums;
    letter-spacing: var(--tracking-tight);
  }
</style>

<div class="flex h-screen shell-root" style="background: var(--bg-base);">

  <!-- ── Left Sidebar ── -->
  <aside class="w-56 flex-shrink-0 flex flex-col border-r" style="border-color: var(--border-default); background: var(--bg-surface);">

    <!-- Logo / Brand -->
    <div class="h-12 flex items-center px-4 border-b" style="border-color: var(--border-default);">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="margin-right: var(--space-2); flex-shrink:0;">
        <rect x="1" y="1" width="7" height="7" rx="1.5" stroke="var(--color-primary)" stroke-width="1.4"/>
        <rect x="10" y="1" width="7" height="7" rx="1.5" stroke="var(--color-primary)" stroke-width="1.4" opacity="0.5"/>
        <rect x="1" y="10" width="7" height="7" rx="1.5" stroke="var(--color-primary)" stroke-width="1.4" opacity="0.5"/>
        <rect x="10" y="10" width="7" height="7" rx="1.5" stroke="var(--color-primary)" stroke-width="1.4" opacity="0.25"/>
      </svg>
      <span class="font-semibold text-sm" style="color: var(--color-primary);">AI Terminal</span>
    </div>

    <!-- Navigation Items -->
    <nav class="flex-1 py-3 px-2 space-y-1">

      <!-- Dashboard -->
      <a data-nav-key="dashboard" href="#" class="flex items-center gap-3 px-3 py-2 rounded text-sm" style="color: var(--text-secondary);">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="5.5" height="5.5" rx="1"/>
          <rect x="9.5" y="1" width="5.5" height="5.5" rx="1"/>
          <rect x="1" y="9.5" width="5.5" height="5.5" rx="1"/>
          <rect x="9.5" y="9.5" width="5.5" height="5.5" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>

      <!-- Trade Plans -->
      <a data-nav-key="trade-plans" href="#" data-dom-id="nav-trade-plans" class="flex items-center gap-3 px-3 py-2 rounded text-sm" style="color: var(--text-secondary);">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3h10"/>
          <path d="M3 6h10"/>
          <path d="M3 9h7"/>
          <path d="M3 12h4"/>
          <path d="M11 10.5l2 2 2-2"/>
        </svg>
        <span>Trade Plans</span>
      </a>

      <!-- Risk Center -->
      <a data-nav-key="risk-center" href="#" data-dom-id="nav-risk-center" class="flex items-center gap-3 px-3 py-2 rounded text-sm" style="color: var(--text-secondary);">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 1.5L2 4v4c0 3.5 2.6 6.7 6 7.5 3.4-.8 6-4 6-7.5V4L8 1.5z"/>
          <path d="M5.5 8l2 2 3.5-3.5"/>
        </svg>
        <span>Risk Center</span>
      </a>

      <!-- Settings (disabled) -->
      <a data-nav-key="settings" href="#" class="flex items-center gap-3 px-3 py-2 rounded text-sm nav-disabled" style="color: var(--text-tertiary);">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1.5v1.5"/>
          <path d="M8 13v1.5"/>
          <path d="M1.5 8h1.5"/>
          <path d="M13 8h1.5"/>
          <path d="M3.4 3.4l1 1"/>
          <path d="M11.6 11.6l1 1"/>
          <path d="M3.4 12.6l1-1"/>
          <path d="M11.6 4.4l1-1"/>
        </svg>
        <span>Settings</span>
      </a>

    </nav>

    <!-- Bottom: System Status -->
    <div class="px-4 py-3 border-t text-xs" style="border-color: var(--border-default); color: var(--text-tertiary);">
      <div class="flex items-center gap-2">
        <span class="status-dot status-dot-success"></span>
        <span>System Online</span>
      </div>
    </div>

  </aside>

  <!-- ── Main Area ── -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Top Status Bar -->
    <header class="h-12 flex items-center justify-between px-6 border-b flex-shrink-0" style="border-color: var(--border-default); background: var(--bg-surface);">

      <!-- Left: Page Title (SLOT: leaf pages fill this) -->
      <div>
        <h1 class="text-sm font-medium" style="color: var(--text-primary);"></h1>
      </div>

      <!-- Right: Status Indicators -->
      <div class="flex items-center gap-4">

        <!-- Execution Mode Badge -->
        <div class="flex items-center gap-2 px-2 py-1 rounded text-xs" style="background: var(--bg-elevated); border: 1px solid var(--border-default);">
          <span class="status-dot status-dot-warning" style="width:6px;height:6px;"></span>
          <span style="color: var(--text-secondary);">Execution: OFF</span>
        </div>

        <!-- Kill Switch Badge -->
        <div class="flex items-center gap-2 px-2 py-1 rounded text-xs" style="background: var(--state-error-muted); border: 1px solid rgba(239,68,68,0.2);">
          <span class="status-dot status-dot-error" style="width:6px;height:6px;"></span>
          <span style="color: var(--state-error);">Kill Switch: ON</span>
        </div>

      </div>
    </header>

    <!-- Content Area (filled by page leaves) -->
    <main class="flex-1 overflow-auto p-6" style="background: var(--bg-base);">
      <!-- PAGE CONTENT GOES HERE -->
    </main>

  </div>

</div>
