[project]
name = "decision-gate"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.5.0", "shared", "risk-engine"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/decision_gate"]

[tool.uv.sources]
shared = { workspace = true }
risk-engine = { workspace = true }

[dependency-groups]
dev = ["pytest>=8.0.0"]