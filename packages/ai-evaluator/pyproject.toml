[project]
name = "ai-evaluator"
version = "0.5.0"
description = "AI 评估器 — v0.5 LLM 解释层 + 规则评分降级"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.5.0",
    "exchange-adapter",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_evaluator"]

[tool.uv.sources]
exchange-adapter = { workspace = true }

[dependency-groups]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0"]
