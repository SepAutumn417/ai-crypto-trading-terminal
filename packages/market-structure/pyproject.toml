[project]
name = "market-structure"
version = "0.3.0"
description = "Market structure recognition: swing points, BOS/CHOCH, support/resistance zones"
requires-python = ">=3.11"
dependencies = [
    "exchange-adapter",
    "shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/market_structure"]

[tool.uv.sources]
exchange-adapter = { workspace = true }
shared = { workspace = true }

[tool.pytest.ini_options]
asyncio_mode = "auto"
