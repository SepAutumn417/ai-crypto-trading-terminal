[project]
name = "auto-plan-engine"
version = "0.4.0"
description = "Auto candidate plan generation engine - generates candidate trade plans from market structure snapshots"
requires-python = ">=3.12"
dependencies = ["exchange-adapter", "shared", "market-structure"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/auto_plan_engine"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
