[project]
name = "exchange-adapter"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.5.0", "shared"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exchange_adapter"]

[tool.uv.sources]
shared = { workspace = true }

[dependency-groups]
dev = ["pytest>=8.0.0", "aiohttp>=3.9.0", "pytest-asyncio>=0.23.0"]
